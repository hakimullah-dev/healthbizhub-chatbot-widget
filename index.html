<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthBizHub AI Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #00BCD4;
      --primary-dark: #0097A7;
      --secondary: #F5A623;
      --bg: #f0f4f8;
      --bg-dark: #1a2332;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 18px;
      --radius-sm: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
      --shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
    }

    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ===== CONTAINER ===== */
    .chat-container {
      width: 100%;
      max-width: 520px;
      height: calc(100vh - 40px);
      max-height: 800px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== HEADER ===== */
    .chat-header {
      background: linear-gradient(135deg, var(--bg-dark) 0%, #243447 100%);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,188,212,0.4);
    }
    .header-avatar svg { width: 24px; height: 24px; fill: white; }
    .header-info { flex: 1; }
    .header-name { font-weight: 700; font-size: 15px; color: #fff; }
    .header-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--primary); margin-top: 2px;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4CAF50; animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ===== MESSAGES ===== */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    /* ===== BUBBLES ===== */
    .msg { display: flex; flex-direction: column; animation: slide-in 0.25s ease; }
    @keyframes slide-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg.user { align-self: flex-end; max-width: 80%; }
    .msg.bot  { align-self: flex-start; max-width: 100%; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,188,212,0.3);
    }
    .msg.bot .msg-bubble {
      background: white;
      color: var(--text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .msg-time {
      font-size: 10px; color: var(--text-muted);
      margin-top: 4px; padding: 0 4px;
    }
    .msg.user .msg-time { text-align: right; }

    /* ===== TYPING INDICATOR (ChatGPT-style) ===== */
    .hbh-typing-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: white;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      width: fit-content;
    }
    .hbh-typing-dots { display: flex; gap: 5px; align-items: center; }
    .hbh-typing-dot {
      width: 8px; height: 8px;
      background: var(--primary);
      border-radius: 50%;
      animation: typing-pulse 1.4s ease-in-out infinite;
      opacity: 0.4;
    }
    .hbh-typing-dot:nth-child(1) { animation-delay: 0s; }
    .hbh-typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .hbh-typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-pulse {
      0%,60%,100% { transform: scale(0.8); opacity: 0.4; }
      30% { transform: scale(1.2); opacity: 1; }
    }
    .hbh-typing-text { font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* ===== CARDS GRID ===== */
    .cards-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .biz-card {
      background: #e8f4fb;
      border: 1.5px solid #c5dff0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex; flex-direction: column;
    }
    .biz-card-top { display: flex; align-items: flex-start; gap: 7px; padding: 10px 10px 4px; }
    .biz-card-avatar {
      width: 48px; height: 48px; border-radius: 50%; overflow: hidden; flex-shrink: 0;
      border: 2px solid white; background: #c5d8ea;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }
    .biz-card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .biz-card-avatar svg { width: 22px; height: 22px; fill: #8aaec8; }
    .biz-card-meta-top { flex: 1; font-size: 10px; color: #4a6580; text-align: right; line-height: 1.5; word-break: break-word; }
    .biz-card-meta-top .cat-label { font-weight: 700; color: #2a7aa8; }
    .biz-card-body { padding: 2px 10px 6px; flex: 1; }
    .biz-card-name { font-weight: 700; font-size: 12px; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
    .biz-card-desc {
      font-size: 10px; color: var(--text-muted); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .badges { display: flex; gap: 3px; flex-wrap: wrap; padding: 0 10px 4px; }
    .badge { padding: 1px 6px; border-radius: 20px; font-size: 9px; font-weight: 700; }
    .badge-verified { background: #dcfce7; color: #16a34a; }
    .badge-featured { background: #fef3c7; color: #d97706; }
    .card-link {
      display: block; text-align: center; padding: 7px;
      background: white; border: 1.5px solid #c5dff0; border-radius: 6px;
      margin: 2px 10px 10px; color: #4a6580;
      text-decoration: none; font-size: 10px; font-weight: 600;
      transition: all 0.2s;
    }
    .card-link:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .cards-slider-wrap { margin-top: 10px; width: 100%; overflow: hidden; }
    .cards-track { display: flex; transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); }
    .cards-slide { min-width: 100%; width: 100%; }
    .cards-nav {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; padding: 8px 0 2px;
    }
    .cards-nav-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: 1.5px solid var(--border); background: white;
      color: var(--text); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; line-height: 1;
    }
    .cards-nav-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .cards-nav-count { font-size: 11px; color: var(--text-muted); min-width: 40px; text-align: center; }

    /* ===== CATEGORY PICKER ===== */
    .hbh-categories { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .hbh-cat-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.2s;
    }
    .hbh-cat-card:hover { border-color: var(--primary); }
    .hbh-cat-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; cursor: pointer; transition: background 0.2s;
    }
    .hbh-cat-header:hover { background: #f0fbfc; }
    .hbh-cat-icon { font-size: 22px; }
    .hbh-cat-info { flex: 1; }
    .hbh-cat-name { font-weight: 700; font-size: 14px; color: var(--text); }
    .hbh-cat-count { font-size: 11px; color: var(--primary); margin-top: 2px; font-weight: 600; }
    .hbh-cat-arrow { color: var(--primary); font-size: 18px; font-weight: bold; }
    .hbh-cat-desc { font-size: 12px; color: var(--text-muted); padding: 0 14px 10px; line-height: 1.45; }
    .hbh-cat-specs { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 14px 12px; }
    .hbh-spec-tag {
      padding: 4px 10px;
      background: #e8f7f9; color: var(--primary-dark);
      border-radius: 12px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid #b2e8f0; transition: all 0.2s;
    }
    .hbh-spec-tag:hover { background: var(--primary); color: white; border-color: var(--primary); }

    /* ===== IMAGE SLIDER ===== */
    .slider-wrap { margin-top: 8px; width: 100%; }
    .slider-img { width: 100%; height: 220px; object-fit: cover; border-radius: var(--radius-sm); display: block; }
    .slider-caption { font-size: 12px; color: var(--text-muted); text-align: center; margin: 6px 0; }
    .slider-controls { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 6px; }
    .slider-btn {
      background: white; border: 1.5px solid var(--border);
      color: var(--text); width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .slider-btn:hover { background: var(--primary); border-color: var(--primary); color: white; }
    .slider-counter { font-size: 12px; color: var(--text-muted); }

    /* ===== TESTIMONIALS ===== */
    .testimonials-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .testimonial-card {
      background: white; border: 1.5px solid var(--border);
      border-left: 3px solid var(--secondary);
      border-radius: var(--radius-sm); padding: 10px 12px;
    }
    .testimonial-title { font-weight: 700; font-size: 13px; color: var(--secondary); margin-bottom: 4px; }
    .testimonial-text { font-size: 12px; color: var(--text-muted); line-height: 1.45; margin-bottom: 5px; }
    .testimonial-link { font-size: 11px; color: var(--primary); text-decoration: none; }
    .testimonial-link:hover { text-decoration: underline; }

    /* ===== LINKS ===== */
    .links-wrap { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .link-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: white;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      text-decoration: none; transition: border-color 0.2s;
    }
    .link-item:hover { border-color: var(--primary); }
    .link-platform { font-size: 13px; font-weight: 700; color: var(--text); min-width: 80px; }
    .link-url { font-size: 11px; color: var(--primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ===== SUB-CATEGORY PICKER ===== */
    .hbh-sub-categories { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .hbh-spec-btn {
      padding: 4px 12px;
      background: white; border: 1.5px solid var(--border); border-radius: 14px;
      color: var(--text-muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .hbh-spec-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
    .hbh-show-all-btn {
      padding: 4px 12px; background: rgba(0,188,212,0.10);
      border: 1.5px solid var(--primary); border-radius: 14px;
      color: var(--primary-dark); font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .hbh-show-all-btn:hover { background: var(--primary); color: white; }
    .hbh-cat-specs-label { font-size: 11px; color: var(--text-muted); padding: 0 14px 4px; font-weight: 600; }
    .view-all-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 10px; padding: 9px 14px;
      background: white; border: 1.5px solid var(--primary); border-radius: var(--radius-sm);
      color: var(--primary-dark); font-size: 12px; font-weight: 700;
      text-decoration: none; transition: all 0.2s;
    }
    .view-all-link:hover { background: var(--primary); color: white; }

    /* ===== POST TYPE PICKER ===== */
    .post-types-wrap { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .post-type-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: white;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: left;
    }
    .post-type-btn:hover { background: #f0fbfc; border-color: var(--primary); }
    .post-count { font-size: 11px; color: var(--text-muted); background: #f1f5f9; padding: 2px 8px; border-radius: 10px; }

    /* ===== SUGGESTIONS ===== */
    .suggestions-bar {
      display: flex; flex-wrap: wrap; gap: 6px;
      padding: 8px 16px 4px; flex-shrink: 0;
    }
    .suggestion-btn {
      padding: 6px 13px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; white-space: nowrap;
    }
    .suggestion-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }

    /* ===== INPUT AREA ===== */
    .chat-input-area {
      padding: 10px 14px 14px;
      border-top: 1px solid var(--border);
      background: white;
      display: flex; gap: 8px; align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 22px;
      padding: 10px 16px;
      color: var(--text);
      font-size: 14px;
      outline: none; resize: none;
      max-height: 90px;
      font-family: inherit; line-height: 1.45;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .chat-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,188,212,0.1); }
    .chat-input::placeholder { color: #94a3b8; }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(0,188,212,0.35);
    }
    .send-btn:hover { transform: scale(1.06); box-shadow: 0 4px 14px rgba(0,188,212,0.5); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 560px) {
      body { padding: 0; }
      .chat-container { height: 100vh; max-height: none; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="header-avatar">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div class="header-info">
        <div class="header-name">HealthBizHub AI</div>
        <div class="header-status"><span class="status-dot"></span>Online &bull; 141+ businesses</div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages"></div>
    <div class="suggestions-bar" id="suggestions-bar"></div>

    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Ask about health businesses..." rows="1"></textarea>
      <button class="send-btn" id="send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <script>
    var WEBHOOK = 'https://agents.metatitans.co.uk/proxy.php';
    var SESSION = 'hbh_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
    var busy = false;

    /* ===== INIT ===== */
    function init() {
      document.getElementById('send-btn').addEventListener('click', send);
      document.getElementById('chat-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
      });
      document.getElementById('chat-input').addEventListener('input', autoResize);
      showWelcome();
    }

    function autoResize() {
      var ta = document.getElementById('chat-input');
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 90) + 'px';
    }

    function showWelcome() {
      renderResponse({
        response_type: 'text',
        message: 'Hi! 👋 I\'m the HealthBizHub AI assistant. I can help you discover 141+ trusted health businesses.\n\nWhat would you like to explore?',
        suggestions: ['Browse all categories', 'Tell me about HealthBizHub', 'Find supplement companies', 'Search health business services']
      });
    }

    /* ===== SEND ===== */
    function send() {
      if (busy) return;
      var input = document.getElementById('chat-input');
      var text = input.value.trim();
      if (!text) return;
      addUserMsg(text);
      input.value = '';
      input.style.height = 'auto';
      clearSuggestions();
      showTyping();
      fetch(WEBHOOK, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, session_id: SESSION })
      })
        .then(function(r) { return r.json(); })
        .then(function(d) { hideTyping(); renderResponse(d); })
        .catch(function() {
          hideTyping();
          renderResponse({ response_type: 'text', message: 'Sorry, I couldn\'t connect right now. Please try again.', suggestions: ['Browse all categories', 'Search businesses'] });
        });
    }

    function sendText(text) {
      document.getElementById('chat-input').value = text;
      send();
    }

    /* ===== RENDER ===== */
    function addUserMsg(text) {
      var msgs = document.getElementById('chat-messages');
      var d = document.createElement('div');
      d.className = 'msg user';
      d.innerHTML = '<div class="msg-bubble">' + esc(text) + '</div><div class="msg-time">' + now() + '</div>';
      msgs.appendChild(d);
      scrollBottom();
    }

    function renderResponse(data) {
      var msgs = document.getElementById('chat-messages');
      var wrapper = document.createElement('div');
      wrapper.className = 'msg bot';

      var bubble = document.createElement('div');
      bubble.className = 'msg-bubble';

      if (data.message) {
        var p = document.createElement('div');
        p.style.whiteSpace = 'pre-line';
        p.textContent = data.message;
        bubble.appendChild(p);
      }

      var rich = buildRich(data);
      if (rich) bubble.appendChild(rich);

      wrapper.appendChild(bubble);
      var t = document.createElement('div');
      t.className = 'msg-time';
      t.textContent = now();
      wrapper.appendChild(t);
      msgs.appendChild(wrapper);

      if (data.suggestions && data.suggestions.length) {
        setSuggestions(data.suggestions);
      }
      scrollBottom();
    }

    function buildRich(data) {
      var type = data.response_type;
      var items = data.items || [];
      if (type === 'cards') {
        var wrap = document.createElement('div');
        var cardsEl = renderCards(items);
        if (cardsEl) wrap.appendChild(cardsEl);
        if (data.view_all_url) {
          var catName = data.category_name || '';
          var link = document.createElement('a');
          link.className = 'view-all-link';
          link.href = data.view_all_url;
          link.target = '_blank';
          link.rel = 'noopener';
          link.innerHTML = '🌐 View all' + (catName ? ' ' + esc(catName) : '') + ' businesses on HealthBizHub';
          wrap.appendChild(link);
        }
        return wrap.children.length ? wrap : null;
      }
      if (type === 'category_picker') return renderCategories(items);
      if (type === 'image_slider') return renderSlider(items);
      if (type === 'testimonial_cards') return renderTestimonials(items);
      if (type === 'links') return renderLinks(items);
      if (type === 'post_type_picker') return renderPostTypes(items, data);
      if (type === 'video_cards') return renderVideos(items);
      return null;
    }

    /* ===== CARDS GRID ===== */
    function makeCardEl(item) {
      var card = document.createElement('div');
      card.className = 'biz-card';

      // Top row: circular avatar + meta (category | location)
      var top = document.createElement('div');
      top.className = 'biz-card-top';

      var avatar = document.createElement('div');
      avatar.className = 'biz-card-avatar';

      if (item.photo_url) {
        var img = document.createElement('img');
        img.alt = item.business_name || '';
        img.loading = 'lazy';
        var svgPh = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
        img.onerror = function() { img.style.display = 'none'; avatar.innerHTML = svgPh; };
        img.src = item.photo_url;
        avatar.appendChild(img);
      } else {
        avatar.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>';
      }

      var catLabel = item.specialty || item.category || '';
      var metaTop = document.createElement('div');
      metaTop.className = 'biz-card-meta-top';
      metaTop.innerHTML =
        (catLabel ? '<div class="cat-label">' + esc(catLabel) + '</div>' : '') +
        (item.location ? '<div>' + esc(item.location) + '</div>' : '');

      top.appendChild(avatar);
      top.appendChild(metaTop);
      card.appendChild(top);

      // Body: name + description
      var body = document.createElement('div');
      body.className = 'biz-card-body';
      body.innerHTML =
        '<div class="biz-card-name">' + esc(item.business_name || '') + '</div>' +
        (item.description ? '<div class="biz-card-desc">' + esc(item.description) + '</div>' : '');
      card.appendChild(body);

      // Badges
      var badges = '';
      if (item.is_verified) badges += '<span class="badge badge-verified">✓ Verified</span>';
      if (item.is_featured) badges += '<span class="badge badge-featured">★ Featured</span>';
      if (badges) {
        var badgeWrap = document.createElement('div');
        badgeWrap.className = 'badges';
        badgeWrap.innerHTML = badges;
        card.appendChild(badgeWrap);
      }

      // View Profile button
      if (item.profile_url) {
        var a = document.createElement('a');
        a.className = 'card-link';
        a.href = item.profile_url;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'View Profile';
        card.appendChild(a);
      }
      return card;
    }

    function renderCards(items) {
      if (!items.length) return null;
      var limited = items.slice(0, 20);

      // Group into pairs (2 cards per slide)
      var slides = [];
      for (var i = 0; i < limited.length; i += 2) {
        slides.push(limited.slice(i, i + 2));
      }

      var wrap = document.createElement('div');
      wrap.className = 'cards-slider-wrap';

      var track = document.createElement('div');
      track.className = 'cards-track';

      slides.forEach(function(pair) {
        var slide = document.createElement('div');
        slide.className = 'cards-slide';
        var grid = document.createElement('div');
        grid.className = 'cards-grid';
        pair.forEach(function(item) { grid.appendChild(makeCardEl(item)); });
        slide.appendChild(grid);
        track.appendChild(slide);
      });
      wrap.appendChild(track);

      if (slides.length > 1) {
        var idx = 0;
        var nav = document.createElement('div');
        nav.className = 'cards-nav';

        var prev = document.createElement('button');
        prev.className = 'cards-nav-btn';
        prev.innerHTML = '&#8249;';
        prev.setAttribute('aria-label', 'Previous');

        var counter = document.createElement('span');
        counter.className = 'cards-nav-count';
        counter.textContent = '1 / ' + slides.length;

        var next = document.createElement('button');
        next.className = 'cards-nav-btn';
        next.innerHTML = '&#8250;';
        next.setAttribute('aria-label', 'Next');

        function goTo(i) {
          idx = (i + slides.length) % slides.length;
          track.style.transform = 'translateX(-' + (idx * 100) + '%)';
          counter.textContent = (idx + 1) + ' / ' + slides.length;
        }

        prev.addEventListener('click', function() { goTo(idx - 1); });
        next.addEventListener('click', function() { goTo(idx + 1); });

        nav.appendChild(prev);
        nav.appendChild(counter);
        nav.appendChild(next);
        wrap.appendChild(nav);
      }

      return wrap;
    }

    /* ===== CATEGORY PICKER ===== */
    function renderCategories(items) {
      if (!items.length) return null;
      // Sub-category items have a 'type' field (sub_specialty or show_all)
      var isSubCat = items.some(function(item) { return item.type === 'sub_specialty' || item.type === 'show_all'; });
      if (isSubCat) return renderSubCategories(items);

      var wrap = document.createElement('div');
      wrap.className = 'hbh-categories';
      items.forEach(function(cat) {
        var card = document.createElement('div');
        card.className = 'hbh-cat-card';
        var icon = cat.value === 'affiliate-products' ? '🏥' : '💼';
        var headerDiv = document.createElement('div');
        headerDiv.className = 'hbh-cat-header';
        headerDiv.innerHTML =
          '<span class="hbh-cat-icon">' + icon + '</span>' +
          '<div class="hbh-cat-info">' +
            '<div class="hbh-cat-name">' + esc(cat.label || '') + '</div>' +
            (cat.count ? '<div class="hbh-cat-count">' + cat.count + ' businesses</div>' : '') +
          '</div>' +
          '<span class="hbh-cat-arrow">→</span>';
        headerDiv.addEventListener('click', function() { sendText('Show businesses in ' + (cat.label || cat.value)); });
        card.appendChild(headerDiv);
        if (cat.description) {
          var desc = document.createElement('div');
          desc.className = 'hbh-cat-desc';
          desc.textContent = cat.description;
          card.appendChild(desc);
        }
        if (cat.specialties && cat.specialties.length) {
          var specsLabel = document.createElement('div');
          specsLabel.className = 'hbh-cat-specs-label';
          specsLabel.textContent = 'Specialties available:';
          card.appendChild(specsLabel);
          var specsDiv = document.createElement('div');
          specsDiv.className = 'hbh-cat-specs';
          cat.specialties.forEach(function(spec) {
            var tag = document.createElement('span');
            tag.className = 'hbh-spec-tag';
            tag.textContent = spec;
            tag.addEventListener('click', function() { sendText('Browse ' + spec + ' category'); });
            specsDiv.appendChild(tag);
          });
          card.appendChild(specsDiv);
        }
        wrap.appendChild(card);
      });
      return wrap;
    }

    /* ===== SUB-CATEGORY PICKER ===== */
    function renderSubCategories(items) {
      var wrap = document.createElement('div');
      wrap.className = 'hbh-sub-categories';

      // "Show all" button first (full row)
      var showAll = items.find(function(i) { return i.type === 'show_all'; });
      if (showAll) {
        var allBtn = document.createElement('button');
        allBtn.className = 'hbh-show-all-btn';
        allBtn.style.width = '100%';
        allBtn.style.marginBottom = '4px';
        allBtn.textContent = '🔎 Show all ' + (showAll.category || showAll.label || '') + ' businesses';
        allBtn.addEventListener('click', function() {
          sendText('Find ' + (showAll.category || showAll.label) + ' businesses');
        });
        wrap.appendChild(allBtn);
      }

      // Sub-specialty chips
      var subItems = items.filter(function(i) { return i.type === 'sub_specialty'; });
      subItems.forEach(function(item) {
        var btn = document.createElement('button');
        btn.className = 'hbh-spec-btn';
        btn.textContent = item.label || '';
        btn.addEventListener('click', function() {
          sendText('Browse ' + (item.label || '') + ' category');
        });
        wrap.appendChild(btn);
      });

      return wrap;
    }

    /* ===== IMAGE SLIDER ===== */
    function renderSlider(items) {
      if (!items.length) return null;
      var idx = 0;
      var wrap = document.createElement('div');
      wrap.className = 'slider-wrap';
      var img = document.createElement('img');
      img.className = 'slider-img';
      var caption = document.createElement('div');
      caption.className = 'slider-caption';
      var counter = document.createElement('span');
      counter.className = 'slider-counter';
      function show(i) {
        idx = (i + items.length) % items.length;
        img.style.display = 'block';
        img.src = '';
        img.src = items[idx].image_url || '';
        img.alt = items[idx].title || '';
        img.loading = 'lazy';
        caption.textContent = (items[idx].title || '') + (items[idx].description ? ' — ' + items[idx].description.substring(0, 60) : '');
        counter.textContent = (idx + 1) + ' / ' + items.length;
      }
      img.onerror = function() { this.style.display = 'none'; };
      wrap.appendChild(img);
      wrap.appendChild(caption);
      if (items.length > 1) {
        var ctrl = document.createElement('div');
        ctrl.className = 'slider-controls';
        var prev = document.createElement('button');
        prev.className = 'slider-btn'; prev.textContent = '‹';
        prev.addEventListener('click', function() { show(idx - 1); });
        var next = document.createElement('button');
        next.className = 'slider-btn'; next.textContent = '›';
        next.addEventListener('click', function() { show(idx + 1); });
        ctrl.appendChild(prev); ctrl.appendChild(counter); ctrl.appendChild(next);
        wrap.appendChild(ctrl);
      }
      show(0);
      return wrap;
    }

    /* ===== TESTIMONIALS ===== */
    function renderTestimonials(items) {
      if (!items.length) return null;
      var wrap = document.createElement('div');
      wrap.className = 'testimonials-wrap';
      items.slice(0, 10).forEach(function(item) {
        var el = document.createElement('div');
        el.className = 'testimonial-card';
        el.innerHTML =
          '<div class="testimonial-title">' + esc(item.title || 'Customer Review') + '</div>' +
          '<div class="testimonial-text">' + esc((item.excerpt || '').substring(0, 250)) + '</div>' +
          (item.detail_url ? '<a class="testimonial-link" href="' + escA(item.detail_url) + '" target="_blank" rel="noopener">Read more →</a>' : '');
        wrap.appendChild(el);
      });
      return wrap;
    }

    /* ===== LINKS ===== */
    function renderLinks(items) {
      if (!items.length) return null;
      var wrap = document.createElement('div');
      wrap.className = 'links-wrap';
      items.forEach(function(item) {
        var a = document.createElement('a');
        a.className = 'link-item';
        a.href = item.url || '#';
        a.target = '_blank'; a.rel = 'noopener';
        a.innerHTML = '<span class="link-platform">' + esc(item.platform || '') + '</span><span class="link-url">' + esc(item.url || '') + '</span>';
        wrap.appendChild(a);
      });
      return wrap;
    }

    /* ===== POST TYPES ===== */
    function renderPostTypes(items, data) {
      if (!items.length) return null;
      var bizName = data.business_name || '';
      var wrap = document.createElement('div');
      wrap.className = 'post-types-wrap';
      items.forEach(function(item) {
        var btn = document.createElement('button');
        btn.className = 'post-type-btn';
        btn.innerHTML = esc(item.label || item.value || '') + (item.count ? '<span class="post-count">' + item.count + '</span>' : '');
        btn.addEventListener('click', function() {
          sendText('Show ' + (item.label || item.value) + (bizName ? ' from ' + bizName : ''));
        });
        wrap.appendChild(btn);
      });
      return wrap;
    }

    /* ===== VIDEO CARDS ===== */
    function renderVideos(items) {
      if (!items.length) return null;
      var wrap = document.createElement('div');
      wrap.className = 'cards-wrap';
      items.slice(0, 8).forEach(function(item) {
        var card = document.createElement('div');
        card.className = 'biz-card';
        var thumb = item.thumbnail_url
          ? '<img class="biz-card-img" src="' + escA(item.thumbnail_url) + '" alt="' + escA(item.title || '') + '" onerror="this.style.display=\'none\'">'
          : '<div class="biz-card-img-ph"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>';
        card.innerHTML = thumb +
          '<div class="biz-card-body"><div class="biz-card-name">' + esc(item.title || 'Video') + '</div></div>' +
          (item.video_url ? '<a class="card-link" href="' + escA(item.video_url) + '" target="_blank" rel="noopener">Watch Video →</a>' : '');
        wrap.appendChild(card);
      });
      return wrap;
    }

    /* ===== TYPING ===== */
    function showTyping() {
      busy = true;
      document.getElementById('send-btn').disabled = true;
      var msgs = document.getElementById('chat-messages');
      var d = document.createElement('div');
      d.className = 'msg bot';
      d.id = 'typing-indicator';
      d.innerHTML =
        '<div class="hbh-typing-wrap">' +
          '<div class="hbh-typing-dots">' +
            '<div class="hbh-typing-dot"></div>' +
            '<div class="hbh-typing-dot"></div>' +
            '<div class="hbh-typing-dot"></div>' +
          '</div>' +
          '<span class="hbh-typing-text">HealthBizHub AI is thinking…</span>' +
        '</div>';
      msgs.appendChild(d);
      scrollBottom();
    }

    function hideTyping() {
      busy = false;
      document.getElementById('send-btn').disabled = false;
      var el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    /* ===== SUGGESTIONS ===== */
    function setSuggestions(list) {
      var bar = document.getElementById('suggestions-bar');
      bar.innerHTML = '';
      list.slice(0, 4).forEach(function(s) {
        var btn = document.createElement('button');
        btn.className = 'suggestion-btn';
        btn.textContent = s;
        btn.addEventListener('click', function() { sendText(s); });
        bar.appendChild(btn);
      });
    }
    function clearSuggestions() { document.getElementById('suggestions-bar').innerHTML = ''; }

    /* ===== HELPERS ===== */
    function scrollBottom() {
      var m = document.getElementById('chat-messages');
      setTimeout(function() { m.scrollTop = m.scrollHeight; }, 60);
    }
    function now() {
      var d = new Date();
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escA(s) { return esc(s); }

    init();
  </script>
</body>
</html>
